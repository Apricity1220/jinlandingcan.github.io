<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>餐厅订餐管理系统 - 移动优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
        /* 移动端卡片视图样式 */
        @media (max-width: 767px) {
            #tableView { display: none; }
            #cardView { display: block; }
        }
        /* 桌面端表格视图样式 */
        @media (min-width: 768px) {
            #tableView { display: block; }
            #cardView { display: none; }
        }
        .ios-fix { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="p-3 md:p-8 pb-20"> <div class="max-w-7xl mx-auto">
        
        <header class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-950 flex items-center gap-2">
                    <span class="text-blue-600">🍽️</span> 订餐管理
                    <span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded-full ml-1">本地版</span>
                </h1>
                <p class="text-gray-500 text-xs mt-1">数据仅存于本地浏览器，快速且隐私</p>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-3 bg-gray-50 p-2 rounded-xl border border-gray-200 w-full sm:w-auto">
                <input type="date" id="filterDate" onchange="renderView()" class="ios-fix flex-grow text-sm bg-transparent border-none focus:ring-0 p-1 cursor-pointer text-gray-900 outline-none">
                <button onclick="resetFilter()" class="text-sm font-medium text-blue-600 hover:text-blue-800 px-3 py-1 bg-white rounded-lg shadow-sm border border-gray-100">全部</button>
                <button onclick="openModal()" class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm font-bold shadow-md">
                    + 新增
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            <div class="card p-5 border-l-4 border-blue-500 flex flex-col justify-between">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-2">今日预约</p>
                <div class="flex items-baseline gap-1">
                    <p class="text-3xl font-extrabold text-gray-950" id="todayCount">0</p>
                    <p class="text-sm text-gray-500">单</p>
                </div>
            </div>
            <div class="card p-5 border-l-4 border-green-500 flex flex-col justify-between">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-2">总预约量</p>
                <div class="flex items-baseline gap-1">
                    <p class="text-3xl font-extrabold text-gray-950" id="totalCount">0</p>
                    <p class="text-sm text-gray-500">单</p>
                </div>
            </div>
            <div class="card p-5 border-l-4 border-amber-500 flex-col justify-between hidden md:flex">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-2">运行状态</p>
                <p class="text-xl font-bold text-green-600 pt-1 flex items-center gap-1.5"><span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>稳定</p>
            </div>
        </div>

        <div id="viewContainer">
            <div id="tableView" class="card overflow-hidden border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="p-4 font-semibold text-gray-600 text-sm">客户姓名</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">预约日期</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">时间</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">人数</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">台位</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">备注</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm">状态</th>
                                <th class="p-4 font-semibold text-gray-600 text-sm w-20">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 text-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div id="cardView" class="space-y-4">
                </div>

            <div id="noResults" class="hidden p-16 text-center text-gray-400 flex flex-col items-center bg-white rounded-2xl shadow-sm border border-gray-100 mt-4">
                <span class="text-6xl mb-4">📅</span>
                <span class="text-lg font-medium">暂无符合条件的预约记录</span>
                <span class="text-sm text-gray-400 mt-1">点击右上角“+ 新增”添加一条吧</span>
            </div>
        </div>
        
        <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl p-6 w-full max-w-xl shadow-2xl overflow-y-auto max-h-[90vh]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-extrabold text-gray-950">新增预约登记</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">客户姓名</label>
                        <input id="inName" type="text" placeholder="周女士 / 吴先生" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition text-base">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">预约日期</label>
                        <input id="inDate" type="date" class="ios-fix w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">具体时间</label>
                        <input id="inTime" type="time" class="ios-fix w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">人数</label>
                        <input id="inCount" type="number" placeholder="10" min="1" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">台位/包厢</label>
                        <input id="inRoom" type="text" placeholder="一号包厢 / 大厅C1" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-base">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">备注信息 (选填)</label>
                        <textarea id="inNote" placeholder="如：庆生、有老人、忌口等" rows="3" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-base"></textarea>
                    </div>
                </div>
                <div class="mt-8 flex gap-3 flex-col sm:flex-row-reverse">
                    <button id="saveBtn" onclick="saveRecord()" class="w-full sm:flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-100 text-base">确认保存</button>
                    <button onclick="closeModal()" class="w-full sm:px-6 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3.5 rounded-xl border border-gray-200 transition text-base">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 本地数据管理
        let reservations = JSON.parse(localStorage.getItem('restaurant_data')) || [];

        function saveToLocal() {
            localStorage.setItem('restaurant_data', JSON.stringify(reservations));
            renderView();
        }

        // 根据屏幕尺寸和数据动态渲染视图
        function renderView() {
            const selectedDate = document.getElementById('filterDate').value;
            let filtered = [...reservations];
            
            if (selectedDate) {
                filtered = filtered.filter(r => r.date === selectedDate);
            }

            // 排序：日期优先，时间次之
            filtered.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

            const isDesktop = window.innerWidth >= 768;
            
            if (isDesktop) {
                renderTableView(filtered);
            } else {
                renderCardView(filtered);
            }

            // 更新状态
            const hasResults = filtered.length > 0;
            document.getElementById('tableView').classList.toggle('hidden', !isDesktop || !hasResults);
            document.getElementById('cardView').classList.toggle('hidden', isDesktop || !hasResults);
            document.getElementById('noResults').classList.toggle('hidden', hasResults);
            
            updateCounters();
        }

        // 渲染桌面端表格视图
        function renderTableView(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(res => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition";
                const isTodayStr = res.date === new Date().toLocaleDateString('sv-SE');
                
                tr.innerHTML = `
                    <td class="p-4 font-semibold text-gray-950">${res.name}</td>
                    <td class="p-4 ${isTodayStr ? 'text-blue-600 font-bold' : 'text-gray-700'} text-sm">${res.date}</td>
                    <td class="p-4 text-sm font-semibold">${res.time}</td>
                    <td class="p-4 text-sm">${res.count}人</td>
                    <td class="p-4"><span class="bg-purple-50 text-purple-700 px-2.5 py-1 rounded-lg text-xs font-bold border border-purple-100">${res.room}</span></td>
                    <td class="p-4 text-gray-500 text-xs max-w-xs truncate" title="${res.note}">${res.note}</td>
                    <td class="p-4">
                        <select onchange="updateStatus(${res.timestamp}, this.value)" class="ios-fix text-xs border border-amber-200 bg-amber-50 text-amber-900 rounded-full px-3 py-1.5 focus:ring-2 focus:ring-blue-100 focus:border-blue-300 cursor-pointer outline-none font-medium">
                            ${getStatusOptions(res.status)}
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteRecord(${res.timestamp})" class="text-gray-400 hover:text-red-500 transition-colors p-1.5 rounded-md hover:bg-red-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 渲染移动端卡片视图
        function renderCardView(data) {
            const container = document.getElementById('cardView');
            container.innerHTML = '';
            
            data.forEach(res => {
                const card = document.createElement('div');
                card.className = "card p-5 border border-gray-100 space-y-4 relative";
                const isTodayStr = res.date === new Date().toLocaleDateString('sv-SE');
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-3">
                        <div>
                            <p class="text-lg font-extrabold text-gray-950">${res.name}</p>
                            <span class="inline-block mt-1 bg-purple-50 text-purple-700 px-2.5 py-0.5 rounded-md text-xs font-bold border border-purple-100">${res.room}</span>
                        </div>
                        <button onclick="deleteRecord(${res.timestamp})" class="text-gray-300 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-red-50 -mr-2 -mt-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-x-3 gap-y-2 bg-gray-50 p-3 rounded-xl text-sm border border-gray-100">
                        <div class="flex items-center gap-2 text-gray-600">
                            <span>📅</span>
                            <span class="${isTodayStr ? 'text-blue-700 font-bold' : 'text-gray-800'}">${res.date}</span>
                        </div>
                        <div class="flex items-center gap-2 text-gray-800 font-semibold">
                            <span>🕒</span>
                            <span>${res.time}</span>
                        </div>
                        <div class="flex items-center gap-2 text-gray-700 col-span-2">
                            <span>👥</span>
                            <span>${res.count} 人</span>
                        </div>
                    </div>

                    <p class="text-xs text-gray-500 bg-white p-2 rounded-md border border-gray-100 italic">备注: ${res.note}</p>

                    <div class="pt-2 border-t border-gray-100">
                        <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wide">预约状态</label>
                        <select onchange="updateStatus(${res.timestamp}, this.value)" class="ios-fix w-full text-sm border border-amber-200 bg-amber-50 text-amber-900 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-100 focus:border-blue-300 cursor-pointer outline-none font-semibold">
                            ${getStatusOptions(res.status)}
                        </select>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 获取状态下拉选项HTML
        function getStatusOptions(selectedStatus) {
            const statuses = ["待到访", "已入座", "已买单", "已取消"];
            return statuses.map(s => `<option value="${s}" ${selectedStatus === s ? 'selected' : ''}>${s}</option>`).join('');
        }

        // 其他原有逻辑保留
        function saveRecord() {
            const data = {
                timestamp: Date.now(),
                name: document.getElementById('inName').value.trim(),
                date: document.getElementById('inDate').value,
                time: document.getElementById('inTime').value,
                count: document.getElementById('inCount').value || "1",
                room: document.getElementById('inRoom').value.trim() || "大厅",
                note: document.getElementById('inNote').value.trim() || "-",
                status: '待到访'
            };
            if(!data.name || !data.date || !data.time) return alert('请填完整客户姓名、日期和时间');
            reservations.push(data);
            saveToLocal();
            closeModal();
            ['inName', 'inTime', 'inCount', 'inRoom', 'inNote'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteRecord(timestamp) {
            if (!confirm('确定删除此记录？')) return;
            reservations = reservations.filter(r => r.timestamp !== timestamp);
            saveToLocal();
        }

        function updateStatus(timestamp, newStatus) {
            const index = reservations.findIndex(r => r.timestamp === timestamp);
            if (index !== -1) {
                reservations[index].status = newStatus;
                saveToLocal();
            }
        }

        function resetFilter() {
            document.getElementById('filterDate').value = '';
            renderView();
        }

        function updateCounters() {
            const todayStr = new Date().toLocaleDateString('sv-SE');
            const todayCount = reservations.filter(r => r.date === todayStr).length;
            document.getElementById('todayCount').innerText = todayCount;
            document.getElementById('totalCount').innerText = reservations.length;
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // 初始化及屏幕旋转/调整大小适配
        window.onload = () => {
            document.getElementById('inDate').value = new Date().toLocaleDateString('sv-SE');
            renderView();
        };
        window.onresize = renderView;
    </script>
</body>
</html>
